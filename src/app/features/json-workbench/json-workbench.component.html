<section class="workbench">
  <app-toolbar
    [valid]="store.isValidJson()"
    [errorMessage]="store.parseErrorMessage()"
    [themeMode]="store.themeMode()"
    [diffOpen]="store.showDiff()"
    (formatPressed)="onFormatPressed()"
    (minifyPressed)="onMinifyPressed()"
    (copyPressed)="onCopyPressed()"
    (pastePressed)="onPastePressed()"
    (downloadPrettyPressed)="onDownloadPrettyPressed()"
    (downloadMinPressed)="onDownloadMinPressed()"
    (openFilePressed)="onOpenFilePressed()"
    (toggleThemePressed)="onToggleThemePressed()"
    (toggleDiffPressed)="onToggleDiffPressed()"
    (toggleSettingsPressed)="onToggleSettingsPressed()"
  />

  @if (store.showDiff()) {
    <app-diff-bar
      [diffResult]="diffService.result()"
      [computing]="diffService.computing()"
      [currentHunkIndex]="currentHunkIndex()"
      [syncScroll]="store.syncScroll()"
      [showOnlyDiffs]="store.showOnlyDiffs()"
      (prevHunk)="goToPrevHunk()"
      (nextHunk)="goToNextHunk()"
      (toggleSyncScroll)="store.toggleSyncScroll()"
      (toggleShowOnlyDiffs)="store.toggleShowOnlyDiffs()"
    />
  }

  <app-toast [message]="store.statusMessage()" />

  <div class="workbench__panels">
    <app-split-pane direction="horizontal" storageKey="json-we-format:split-ratio">
      <app-editor-panel
        split-start
        [rawText]="store.rawText()"
        [panelTitle]="store.showDiff() ? 'Baseline' : 'Input'"
        [leftMode]="store.leftMode()"
        [mismatchedIndexes]="store.mismatchedBracketIndexes()"
        [jsonValue]="store.workingJson()"
        [showDiff]="store.showDiff()"
        diffSide="left"
        [diffRows]="diffService.result()?.rows ?? []"
        [activeHunkStart]="activeHunkStart()"
        [activeHunkEnd]="activeHunkEnd()"
        [showOnlyDiffs]="store.showOnlyDiffs()"
        [syncScroll]="store.syncScroll()"
        [externalScrollTop]="leftScrollTop()"
        [formatOnAltClick]="settings.formatOnAltClick()"
        [formatOnBadgeClick]="settings.formatOnBadgeClick()"
        [autoFixEnabled]="settings.autoFixOnPasteEnabled()"
        (rawTextChange)="onRawTextChanged($event)"
        (fileDropped)="onFileDropped($event)"
        (modeChange)="onLeftModeChanged($event)"
        (diffScrolled)="onLeftDiffScrolled($event)"
        (formatRequested)="onFormatPressed()"
      />

      <app-editor-panel
        split-end
        [rawText]="store.baselineText()"
        [panelTitle]="store.showDiff() ? 'Working' : 'Output'"
        [leftMode]="store.rightMode()"
        [mismatchedIndexes]="[]"
        [jsonValue]="store.baselineJson()"
        [showDiff]="store.showDiff()"
        diffSide="right"
        [diffRows]="diffService.result()?.rows ?? []"
        [activeHunkStart]="activeHunkStart()"
        [activeHunkEnd]="activeHunkEnd()"
        [showOnlyDiffs]="store.showOnlyDiffs()"
        [syncScroll]="store.syncScroll()"
        [externalScrollTop]="rightScrollTop()"
        [formatOnAltClick]="false"
        [formatOnBadgeClick]="false"
        (rawTextChange)="onBaselineTextChanged($event)"
        (fileDropped)="onBaselineFileDropped($event)"
        (modeChange)="onRightModeChanged($event)"
        (diffScrolled)="onRightDiffScrolled($event)"
      />
    </app-split-pane>
  </div>
</section>

<!-- ── Download confirmation dialog ─────────────────────────────── -->
@if (showConfirmDownload()) {
  <app-confirm-dialog
    title="Confirmar descarga"
    [message]="store.isValidJson() ? '¿Deseas descargar el archivo JSON?' : ''"
    confirmText="Descargar"
    cancelText="Cancelar"
    [showDontAsk]="true"
    [confirmDisabled]="!store.isValidJson()"
    [warningText]="store.isValidJson() ? '' : 'El JSON actual no es válido. Corrígelo antes de descargar.'"
    (closed)="onDownloadConfirmClosed($event)"
  />
}

<!-- ── Settings side-panel ───────────────────────────────────────── -->
@if (showSettings()) {
  <app-settings-panel (closed)="showSettings.set(false)" />
}
