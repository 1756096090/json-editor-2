<header class="toolbar" [class.toolbar--collapsed]="collapsed()" role="toolbar" aria-label="JSON editor actions">
  <div class="toolbar__body">
    <div class="toolbar__group">

    <!-- PRIMARY: Open file ─── high frequency, high consequence -->
    <div class="toolbar__actions" role="group" aria-label="File actions">
      <app-ui-button
        size="sm"
        variant="default"
        tooltipText="Open a .json file from disk"
        (pressed)="openFilePressed.emit()"
      >
        Open
      </app-ui-button>
      <app-ui-button
        size="sm"
        variant="ghost"
        tooltipText="Import JSON from a URL"
        (pressed)="importUrlPressed.emit()"
      >
        From URL
      </app-ui-button>
    </div>

    <span class="toolbar__divider" aria-hidden="true"></span>

    <!-- PRIMARY: Format + Minify ─── core transformations -->
    <div class="toolbar__actions" role="group" aria-label="Format actions">
      <app-ui-button
        size="sm"
        variant="accent"
        tooltipText="Format JSON (Ctrl+Shift+F)"
        (pressed)="formatPressed.emit()"
      >
        Format
      </app-ui-button>
      <app-ui-button
        size="sm"
        variant="default"
        tooltipText="Minify JSON (Ctrl+M)"
        (pressed)="minifyPressed.emit()"
      >
        Minify
      </app-ui-button>
    </div>

    <span class="toolbar__divider" aria-hidden="true"></span>

    <!-- SECONDARY: Clipboard + Downloads ─── support actions -->
    <div class="toolbar__actions" role="group" aria-label="Clipboard and download actions">
      <app-ui-button
        size="sm"
        variant="ghost"
        tooltipText="Copy active panel to clipboard"
        (pressed)="copyPressed.emit()"
      >
        Copy
      </app-ui-button>
      <app-ui-button
        size="sm"
        variant="ghost"
        tooltipText="Paste from clipboard"
        (pressed)="pastePressed.emit()"
      >
        Paste
      </app-ui-button>
      <app-ui-button
        size="sm"
        variant="ghost"
        tooltipText="Download formatted JSON (Ctrl+S)"
        (pressed)="downloadPrettyPressed.emit()"
      >
        &#x2193; Formatted
      </app-ui-button>
      <app-ui-button
        size="sm"
        variant="ghost"
        tooltipText="Download minified JSON"
        (pressed)="downloadMinPressed.emit()"
      >
        &#x2193; Minified
      </app-ui-button>
    </div>

    <span class="toolbar__divider" aria-hidden="true"></span>

    <!-- EXPLORATORY: Diff toggle ─── mode switch -->
    <app-ui-button
      size="sm"
      [variant]="diffOpen() ? 'active' : 'ghost'"
      [ariaPressed]="diffOpen()"
      tooltipText="Toggle diff mode (Ctrl+Shift+D)"
      (pressed)="toggleDiffPressed.emit()"
    >
      Diff
    </app-ui-button>

  </div>
  </div>

  <!-- Meta: validation status + settings + collapse toggle -->
  <div class="toolbar__meta">
    @if (autosavedLabel()) {
      <span class="toolbar__autosaved" aria-live="polite" aria-atomic="true">
        {{ autosavedLabel() }}
      </span>
    }

    <app-status-badge
      [variant]="valid() ? 'success' : 'danger'"
      [label]="valid() ? '✓ Valid' : '✗ Invalid'"
    />

    <app-ui-button
      size="sm"
      variant="ghost"
      ariaLabel="Open settings"
      tooltipText="Settings"
      (pressed)="toggleSettingsPressed.emit()"
    >
      ⚙
    </app-ui-button>

    <button
      class="toolbar__collapse-btn"
      type="button"
      [attr.aria-expanded]="!collapsed()"
      [attr.aria-label]="collapsed() ? 'Expand toolbar' : 'Collapse toolbar'"
      [title]="collapsed() ? 'Expand tools (show toolbar)' : 'Collapse tools (more editor space)'"
      (click)="toggleCollapse.emit()"
    >{{ collapsed() ? '▾' : '▴' }}</button>
  </div>
</header>
