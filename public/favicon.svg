<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0ea5e9"/>
  <!-- Left brace -->
  <text x="3" y="23" font-family="monospace" font-size="18" font-weight="700" fill="white">{</text>
  <!-- Scan line accent -->
  <rect x="10" y="14.5" width="12" height="2.5" rx="1.2" fill="white" opacity="0.9"/>
  <rect x="10" y="10" width="8" height="2" rx="1" fill="white" opacity="0.5"/>
  <rect x="10" y="19.5" width="9" height="2" rx="1" fill="white" opacity="0.5"/>
  <!-- Right brace -->
  <text x="23" y="23" font-family="monospace" font-size="18" font-weight="700" fill="white">}</text>
</svg>
